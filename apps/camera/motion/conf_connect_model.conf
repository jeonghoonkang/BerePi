[motion]
# detection_5min.py scans this 24-hour recent index instead of the full Motion archive.
motion_dir = /var/lib/motion_recent
lookback_minutes = 5
recursive = false
event_log_path = person_detected_events.jsonl

[model]
# Gemma4 31B remote model endpoint. Ollama-compatible API is assumed.
# If endpoint_url is empty, server_url + /api/generate is used.
server_url = http://127.0.0.1:11434
endpoint_url =
model_name = gemma4:31b
user_id =
user_pw =
timeout_seconds = 120

# The script sends this prompt with one image encoded as base64.
# Return JSON so the script can parse the result robustly.
prompt = You are checking a security camera image. Determine whether any person is visible. Count only visible people. Reply only as compact JSON with this exact schema: {"person_detected": true/false, "person_count": 0}

[telegram]
# Telegram Bot API settings. If bot_token/chat_id are empty, the script uses
# TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID environment variables.
bot_token =
chat_id =
timeout_seconds = 30
# bot_allowed_chat_ids: comma-separated list of chat IDs allowed to request photos
# via telegram_bot.py. Leave empty to allow requests from any user.
# Example: bot_allowed_chat_ids = 123456789, 987654321
bot_allowed_chat_ids =
