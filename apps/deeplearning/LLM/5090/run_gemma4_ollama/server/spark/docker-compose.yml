name: gemma4-ollama-spark

services:
  gemma4-server:
    build:
      context: ..
      dockerfile: spark/Dockerfile
    image: gemma4-ollama-server:latest
    container_name: gemma4-ollama-server
    restart: unless-stopped
    ports:
      - "${GEMMA4_SERVER_PORT:-8082}:8082"
    environment:
      GEMMA4_SERVER_HOST: "0.0.0.0"
      GEMMA4_SERVER_PORT: "8082"
      OLLAMA_BASE_URL: "http://127.0.0.1:11434"
      OLLAMA_HOST: "127.0.0.1:11434"
      OLLAMA_BIN: "/usr/local/bin/ollama"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-gemma4:31b}"
      OLLAMA_CONTEXT_LENGTH: "${OLLAMA_CONTEXT_LENGTH:-8192}"
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:-60m}"
      AUTO_PULL: "${AUTO_PULL:-1}"
      API_KEY_CONF_FILE: "/app/state/api_key.conf"
      PROMPT_HISTORY_FILE: "/app/state/prompt_history.txt"
      USER_PROMPT_HISTORY_FILE: "/app/state/history_user_prompt.txt"
      GEMMA4_ACCESS_LOG_FILE: "/app/logs/access.jsonl"
      GEMMA4_SERVER_WORKSPACE_DIR: "/app/workspace"
      GEMMA4_MACH_STATS_DIR: "/app/mach_stats"
      GEMMA4_REQUEST_TIMEOUT: "${GEMMA4_REQUEST_TIMEOUT:-120}"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}"
    gpus: all
    volumes:
      - ollama-models:/root/.ollama
      - gemma4-state:/app/state
      - gemma4-logs:/app/logs
      - gemma4-workspace:/app/workspace
      - gemma4-mach-stats:/app/mach_stats
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8082/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  ollama-models:
  gemma4-state:
  gemma4-logs:
  gemma4-workspace:
  gemma4-mach-stats:
