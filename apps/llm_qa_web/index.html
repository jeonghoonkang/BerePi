<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>LLM기반 QA 기술</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2em; }
    textarea { width: 100%; }
    pre { background: #f4f4f4; padding: 1em; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>LLM기반 QA 기술</h1>
  <p>질문을 입력하면 LLM이 답변을 제공합니다.</p>
  <textarea id="question" rows="4" placeholder="LLM에 질문을 입력하세요..."></textarea><br />
  <button id="askBtn">질문하기</button>
  <pre id="answer"></pre>
  <script>
    async function askLLM() {
      const question = document.getElementById('question').value.trim();
      const answerEl = document.getElementById('answer');
      if (!question) {
        answerEl.textContent = '질문을 입력하세요.';
        return;
      }
      answerEl.textContent = '답변 생성 중...';
      const res = await fetch('/api/ask', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          prompt: question
        })
      });
      const data = await res.json();
      answerEl.textContent = res.ok ? data.answer : (data.error || '오류가 발생했습니다.');
    }
    document.getElementById('askBtn').addEventListener('click', askLLM);
  </script>
</body>
</html>
